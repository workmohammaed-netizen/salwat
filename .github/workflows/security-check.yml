name: Security check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xss-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check for unsanitized user input in innerHTML
        run: node scripts/check-xss.mjs index.html
